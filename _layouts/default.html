<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="site-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="site-title">
          <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>

        <div class="terminal-prompt">~/gizthenerd $</div>

        <nav class="sidebar-nav">
          <a href="{{ '/' | relative_url }}#about" class="nav-link">About</a>
          <a href="{{ '/' | relative_url }}#publications" class="nav-link">Publications</a>
          <a href="{{ '/' | relative_url }}#experience" class="nav-link">Experience</a>
          <a href="{{ '/' | relative_url }}#education" class="nav-link">Education</a>
          <a href="{{ '/blogs/' | relative_url }}" class="nav-link">Blog</a>
        </nav>

        <div class="sidebar-links">
          <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener">LinkedIn</a>
          <span class="sep">/</span>
          <a href="{{ site.github_url }}" target="_blank" rel="noopener">GitHub</a>
          <span class="sep">/</span>
          <a href="{{ site.cv_url }}" target="_blank" rel="noopener">CV</a>
        </div>

        <div class="sidebar-footer">
          <span class="blink">_</span>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      {{ content }}
    </main>

  </div>

</body>
</html>
