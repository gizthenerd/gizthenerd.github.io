---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="post-meta">{{ page.date | date: "%B %d, %Y" }}</div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <div class="post-back">
    <a href="{{ '/blogs/' | relative_url }}">&larr; back to blog</a>
  </div>
</article>
